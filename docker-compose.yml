services:
  counselai:
    build: .
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - COUNSELAI_DATABASE_URL=sqlite+aiosqlite:///data/counselai.db
    volumes:
      - counselai-data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8501/health')"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3

volumes:
  counselai-data:
