<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CounselAI Live</title>
<style>
:root{--bg1:#0a1628;--bg2:#1a2744;--teal:#46d9d1;--blue:#2f7bf6;--card:#0f1f35;--text:#e6f2ff;--muted:#9bb3d3;--danger:#ff7b7b;}
*{box-sizing:border-box;}
body{margin:0;font-family:"Space Grotesk", "IBM Plex Sans", system-ui, sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 20% 0%,#132a4a 0%,transparent 60%),linear-gradient(160deg,var(--bg1),var(--bg2));min-height:100vh;}
.app{max-width:980px;margin:0 auto;padding:28px 20px 40px;}
.card{background:linear-gradient(180deg,#10233e, var(--card));border:1px solid rgba(70,217,209,.2);border-radius:20px;padding:22px;box-shadow:0 18px 60px rgba(0,0,0,.35);}
.hidden{display:none;}
h1,h2{margin:0 0 16px;letter-spacing:.3px;}
label{display:block;margin:14px 0 6px;color:var(--muted);font-size:.92rem;}
input,select,button,textarea{font:inherit;border-radius:12px;border:1px solid rgba(70,217,209,.2);background:#0c1b31;color:var(--text);padding:12px 14px;width:100%;}
button{cursor:pointer;background:linear-gradient(135deg,var(--teal),var(--blue));border:none;color:#031321;font-weight:600;transition:transform .2s ease, box-shadow .2s ease;}
button:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(47,123,246,.35);}
.grid{display:grid;gap:16px;}
.two{grid-template-columns:1fr 1fr;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px;}
.status{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.95rem;}
.status .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px rgba(70,217,209,.6);}
.timer{font-variant-numeric:tabular-nums;color:var(--text);}
.live{position:relative;min-height:520px;}
.orb-wrap{display:flex;align-items:center;justify-content:center;padding:30px 0 10px;}
.orb{width:160px;height:160px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#7fffe9 0%,#3dc5c0 35%,#2461b8 75%);box-shadow:0 0 30px rgba(70,217,209,.5);animation:orbFloat 4s ease-in-out infinite;}
.orb.speaking{animation:orbPulse 1.1s ease-in-out infinite;box-shadow:0 0 40px rgba(70,217,209,.9);}
@keyframes orbFloat{0%,100%{transform:translateY(0);}50%{transform:translateY(-8px);}}
@keyframes orbPulse{0%{transform:scale(1);}50%{transform:scale(1.08);}100%{transform:scale(1);}}
.preview{position:absolute;top:16px;right:16px;width:130px;height:130px;border-radius:50%;overflow:hidden;border:2px solid rgba(70,217,209,.7);box-shadow:0 10px 28px rgba(0,0,0,.4);background:#081424;}
.preview video{width:100%;height:100%;object-fit:cover;}
.transcript{margin-top:16px;background:#0b182c;border-radius:16px;padding:14px;max-height:220px;overflow:auto;border:1px solid rgba(47,123,246,.25);}
.entry{margin:8px 0;display:flex;gap:8px;}
.entry .tag{font-weight:600;color:var(--teal);min-width:70px;}
.entry.ai .tag{color:var(--blue);}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1b2a48;border:1px solid rgba(255,123,123,.6);padding:10px 14px;border-radius:10px;color:var(--text);display:none;}
.meta{color:var(--muted);font-size:.95rem;}
.summary-block{background:#0c1b31;border-radius:14px;padding:14px;border:1px solid rgba(70,217,209,.2);}
@media (max-width:760px){.two{grid-template-columns:1fr;}.preview{position:static;margin:0 auto 12px;}.live{min-height:auto;}.orb{width:130px;height:130px;}}
</style>
</head>
<body>
<div class="app">
  <section id="welcome" class="card">
    <h1>Welcome to CounselAI Live</h1>
    <div class="grid two">
      <div>
        <label for="student-name">Student name</label>
        <input id="student-name" placeholder="Avery Lee" />
      </div>
      <div>
        <label for="class-name">Class</label>
        <input id="class-name" placeholder="PSY 310" />
      </div>
    </div>
    <label for="case-study">Case study</label>
    <select id="case-study"></select>
    <div style="margin-top:18px;">
      <button id="start-btn">Start session</button>
    </div>
  </section>

  <section id="live" class="card hidden live">
    <div class="topbar">
      <div class="status"><span class="dot"></span><span id="status-text">Connecting...</span></div>
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="preview"><video id="preview" autoplay muted playsinline></video></div>
    <div class="orb-wrap"><div id="orb" class="orb"></div></div>
    <div class="transcript" id="transcript"></div>
    <div style="margin-top:16px;display:flex;gap:12px;justify-content:flex-end;">
      <button id="end-btn">End session</button>
    </div>
  </section>

  <section id="summary" class="card hidden">
    <h2>Session summary</h2>
    <div class="grid two">
      <div class="summary-block">
        <div class="meta" id="summary-meta"></div>
      </div>
      <div class="summary-block">
        <strong>Behavioral profile</strong>
        <div class="meta" id="behavioral-profile">Awaiting analysis...</div>
      </div>
    </div>
    <div class="summary-block" style="margin-top:16px;">
      <strong>Transcript</strong>
      <div class="meta" id="summary-transcript" style="margin-top:8px;white-space:pre-wrap;"></div>
    </div>
    <div style="margin-top:18px;">
      <button id="new-btn">New session</button>
    </div>
  </section>
</div>
<audio id="ai-audio" autoplay></audio>
<div class="toast" id="toast"></div>
<script>
const screens = {welcome:document.getElementById('welcome'),live:document.getElementById('live'),summary:document.getElementById('summary')};
const statusText = document.getElementById('status-text');
const timerEl = document.getElementById('timer');
const transcriptEl = document.getElementById('transcript');
const orb = document.getElementById('orb');
const preview = document.getElementById('preview');
const aiAudio = document.getElementById('ai-audio');
const toast = document.getElementById('toast');
let pc, dataChannel, mediaStream, recorder, recordedChunks = [];
let timerStart, timerHandle, currentAiEntry = null;
let sessionMeta = null;

function showScreen(name){Object.values(screens).forEach(s=>s.classList.add('hidden'));screens[name].classList.remove('hidden');}
function setStatus(text){statusText.textContent = text;}
function showToast(msg){toast.textContent = msg;toast.style.display='block';setTimeout(()=>toast.style.display='none',4000);}
function formatTime(ms){const s=Math.floor(ms/1000);const m=String(Math.floor(s/60)).padStart(2,'0');const r=String(s%60).padStart(2,'0');return `${m}:${r}`;}
function addEntry(role,text){const entry=document.createElement('div');entry.className=`entry ${role}`;const tag=document.createElement('div');tag.className='tag';tag.textContent=role==='ai'?'AI':'Student';const body=document.createElement('div');body.textContent=text;entry.append(tag,body);transcriptEl.append(entry);transcriptEl.scrollTop=transcriptEl.scrollHeight;return body;}
function updateTimer(){timerEl.textContent=formatTime(Date.now()-timerStart);}

async function startSession(){
  const name=document.getElementById('student-name').value.trim()||'Student';
  const className=document.getElementById('class-name').value.trim()||'Class';
  const scenario=document.getElementById('case-study').value;
  sessionMeta={name,className,scenario,start:new Date()};
  showScreen('live');
  setStatus('Requesting media...');

  try{
    mediaStream = await navigator.mediaDevices.getUserMedia({audio:true,video:true});
  }catch(err){
    mediaStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});
  }

  preview.srcObject = mediaStream;
  if (mediaStream.getVideoTracks().length === 0) {
    preview.parentElement.style.display='none';
  }

  recorder = new MediaRecorder(mediaStream);
  recorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
  recorder.start();

  pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  const audioTransceiver = pc.addTransceiver('audio', {direction:'sendrecv'});
  const micTrack = mediaStream.getAudioTracks()[0];
  await audioTransceiver.sender.replaceTrack(micTrack);

  pc.ontrack = e => {
    aiAudio.srcObject = e.streams[0];
    aiAudio.play().catch(()=>{});
  };

  dataChannel = pc.createDataChannel('oai-events');
  dataChannel.onmessage = handleEventMessage;
  dataChannel.onopen = () => {
    dataChannel.send(JSON.stringify({type:'session.update',session:{turn_detection:{type:'server_vad',threshold:0.5,silence_duration_ms:500},input_audio_transcription:{model:'whisper-1'}}}));
    dataChannel.send(JSON.stringify({type:'response.create'}));
    setStatus('Listening...');
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIce(pc);

  setStatus('Connecting...');
  const resp = await fetch(`/api/rtc-connect?scenario=${encodeURIComponent(scenario)}`, {
    method:'POST', body: pc.localDescription.sdp, headers:{'Content-Type':'application/sdp'}
  });
  if (resp.status !== 200 && resp.status !== 201) throw new Error(`RTC connect failed (${resp.status})`);
  const answerSdp = await resp.text();
  await pc.setRemoteDescription({type:'answer', sdp: answerSdp});

  timerStart = Date.now();
  timerHandle = setInterval(updateTimer, 500);
}

function handleEventMessage(ev){
  let msg;try{msg=JSON.parse(ev.data);}catch{return;}
  switch(msg.type){
    case 'response.audio_transcript.delta':
      orb.classList.add('speaking');
      if (!currentAiEntry) currentAiEntry = addEntry('ai','');
      currentAiEntry.textContent += msg.delta || '';
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      setStatus('AI speaking...');
      break;
    case 'response.audio_transcript.done':
      if (currentAiEntry) { currentAiEntry.textContent = msg.transcript || currentAiEntry.textContent; currentAiEntry = null; }
      break;
    case 'response.done':
      orb.classList.remove('speaking');
      setStatus('Listening...');
      break;
    case 'conversation.item.input_audio_transcription.completed':
      addEntry('student', msg.transcript || '');
      break;
    case 'input_audio_buffer.speech_started':
      setStatus('You are speaking...');
      break;
    case 'input_audio_buffer.speech_stopped':
      setStatus('Processing...');
      break;
    case 'error':
      showToast(msg.message || 'An error occurred.');
      break;
  }
}

function waitForIce(pc){
  if (pc.iceGatheringState === 'complete') return Promise.resolve();
  return new Promise(resolve=>{
    const check=()=>{ if (pc.iceGatheringState === 'complete'){ pc.removeEventListener('icegatheringstatechange', check); resolve(); } };
    pc.addEventListener('icegatheringstatechange', check);
  });
}

async function endSession(){
  setStatus('Ending...');
  clearInterval(timerHandle);
  if (recorder && recorder.state !== 'inactive') recorder.stop();
  if (pc) pc.close();
  if (mediaStream) mediaStream.getTracks().forEach(t=>t.stop());

  const transcriptText = Array.from(transcriptEl.querySelectorAll('.entry')).map(e=>e.textContent).join('\n');
  const duration = formatTime(Date.now()-timerStart);
  document.getElementById('summary-meta').textContent = `${sessionMeta.name} • ${sessionMeta.className} • ${sessionMeta.scenario} • ${duration}`;
  document.getElementById('summary-transcript').textContent = transcriptText;
  showScreen('summary');

  try{
    const fd = new FormData();
    const blob = new Blob(recordedChunks, {type:'video/webm'});
    fd.append('video', blob, 'session.webm');
    fd.append('transcript', JSON.stringify(Array.from(transcriptEl.querySelectorAll('.entry')).map(e=>({role:e.classList.contains('ai')?'counsellor':'student',text:e.querySelector('div:last-child')?.textContent||''}))));
    fd.append('student_name', sessionMeta.name);
    fd.append('student_class', sessionMeta.className);
    const resp = await fetch('/api/analyze-session', {method:'POST', body: fd});
    if (resp.ok) {
      const data = await resp.json();
      document.getElementById('behavioral-profile').textContent = data.profile || JSON.stringify(data);
    } else {
      document.getElementById('behavioral-profile').textContent = 'Analysis unavailable.';
    }
  }catch{
    document.getElementById('behavioral-profile').textContent = 'Analysis unavailable.';
  }
}

document.getElementById('start-btn').addEventListener('click', ()=>startSession().catch(err=>{showToast(err.message);showScreen('welcome');}));
document.getElementById('end-btn').addEventListener('click', endSession);
document.getElementById('new-btn').addEventListener('click', ()=>{location.reload();});

// Load case studies from server
(async()=>{
  try{
    const r = await fetch('/api/case-studies');
    const d = await r.json();
    const sel = document.getElementById('case-study');
    sel.innerHTML = '';
    d.case_studies.forEach(cs=>{
      const o = document.createElement('option');
      o.value = cs.scenario_text;
      o.textContent = cs.id + ' • ' + cs.title + ' (' + cs.target_class + ')';
      sel.appendChild(o);
    });
  }catch(e){showToast('Failed to load case studies');}
})();
</script>
</body>
</html>
