<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CounselAI Live</title>
<style>
:root{--bg:#0a1628;--panel:#0f1f35;--panel-2:#0c1a30;--teal:#46d9d1;--blue:#2f7bf6;--text:#e6f2ff;--muted:#9bb3d3;--danger:#ff7b7b;--glow:0 0 30px rgba(70,217,209,.45)}
*{box-sizing:border-box}
body{margin:0;font-family:"Space Grotesk","IBM Plex Sans",system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 15% 0%,#133056 0%,transparent 60%),linear-gradient(160deg,#081223,var(--bg));min-height:100vh}
.app{max-width:1100px;margin:0 auto;padding:28px 20px 40px}
.card{background:linear-gradient(180deg,#10233e,var(--panel));border:1px solid rgba(70,217,209,.2);border-radius:20px;padding:22px;box-shadow:0 18px 60px rgba(0,0,0,.35)}
.hidden{display:none}
h1,h2,h3{margin:0 0 14px;letter-spacing:.3px}
label{display:block;margin:14px 0 6px;color:var(--muted);font-size:.92rem}
input,select,button{font:inherit;border-radius:12px;border:1px solid rgba(70,217,209,.2);background:#0c1b31;color:var(--text);padding:12px 14px;width:100%}
button{cursor:pointer;background:linear-gradient(135deg,var(--teal),var(--blue));border:none;color:#031321;font-weight:600;transition:transform .2s ease,box-shadow .2s ease}
button:hover{transform:translateY(-1px);box-shadow:0 8px 18px rgba(47,123,246,.35)}
button.danger{background:linear-gradient(135deg,#ff7b7b,#e04242);color:#1b0b0b}
.grid{display:grid;gap:16px}
.two{grid-template-columns:1fr 1fr}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.status{display:flex;align-items:center;gap:10px;color:var(--muted);font-size:.95rem}
.status .dot{width:10px;height:10px;border-radius:50%;background:var(--teal);box-shadow:0 0 10px rgba(70,217,209,.6)}
.timer{font-variant-numeric:tabular-nums;color:var(--text)}
.live-grid{display:flex;flex-direction:column;gap:18px}
.top-row{display:flex;gap:18px;align-items:flex-start}
.preview{width:280px;aspect-ratio:4/3;border-radius:16px;overflow:hidden;border:2px solid rgba(70,217,209,.7);box-shadow:0 12px 30px rgba(0,0,0,.4);background:#081424}
.preview video{width:100%;height:100%;object-fit:cover}
.orb-wrap{display:flex;align-items:center;justify-content:center}
.orb{position:relative;width:100px;height:100px;border-radius:50%;background:radial-gradient(circle at 30% 30%,#7fffe9 0%,#3dc5c0 35%,#2461b8 75%);box-shadow:var(--glow);animation:orbFloat 4s ease-in-out infinite}
.orb.speaking{box-shadow:0 0 40px rgba(70,217,209,.9)}
.orb.speaking::before,
.orb.speaking::after{
  content:"";
  position:absolute;
  inset:-10px;
  border-radius:50%;
  border:2px solid rgba(70,217,209,0.4);
  animation:ripple 1.5s ease-out infinite;
}
.orb.speaking::after{inset:-22px;animation-delay:.6s}
@keyframes orbFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
@keyframes ripple{0%{transform:scale(0.85);opacity:.65}100%{transform:scale(1.35);opacity:0}}
.case-card{background:var(--panel-2);border-radius:16px;padding:16px;border:1px solid rgba(47,123,246,.25);min-height:100%;flex:1}
.case-text{white-space:pre-wrap;color:var(--text);line-height:1.4}
.transcript{background:#0b182c;border-radius:16px;padding:14px;max-height:40vh;overflow:auto;border:1px solid rgba(47,123,246,.25)}
.bottom-row{display:flex;align-items:center;justify-content:center;gap:16px}
.entry{margin:8px 0;display:flex;gap:10px}
.entry .tag{font-weight:600;color:var(--teal);min-width:90px}
.entry.ai .tag{color:var(--blue)}
.meta{color:var(--muted);font-size:.95rem}
.metrics{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(160px,1fr))}
.metric{background:#0c1b31;border-radius:12px;padding:12px;border:1px solid rgba(70,217,209,.2)}
.metric .label{color:var(--muted);font-size:.85rem}
.metric .value{font-size:1.2rem;font-weight:600}
.toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);background:#1b2a48;border:1px solid rgba(255,123,123,.6);padding:10px 14px;border-radius:10px;color:var(--text);display:none;z-index:20}
@media (max-width:900px){.top-row{flex-direction:column}.preview{width:100%}.bottom-row{flex-direction:column;gap:12px}}
@media (max-width:760px){.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <section id="welcome" class="card">
    <h1>Welcome to CounselAI Live</h1>
    <div class="grid two">
      <div>
        <label for="student-name">Student name</label>
        <input id="student-name" placeholder="Avery Lee" />
      </div>
      <div>
        <label for="class-name">Class</label>
        <input id="class-name" placeholder="PSY 310" />
      </div>
    </div>
    <label for="case-study">Case study</label>
    <select id="case-study"></select>
    <div style="margin-top:18px;">
      <button id="start-btn">Start session</button>
    </div>
  </section>

  <section id="live" class="card hidden">
    <div class="topbar">
      <div class="status"><span class="dot"></span><span id="status-text">Connecting...</span></div>
      <div class="timer" id="timer">00:00</div>
    </div>
    <div class="live-grid">
      <div class="top-row">
        <div class="preview" id="preview-wrap"><video id="preview" autoplay muted playsinline></video></div>
        <div class="case-card">
          <h3>Case Study</h3>
          <div id="case-study-text" class="case-text">Select a case study to view the full text.</div>
        </div>
      </div>
      <div class="transcript" id="transcript"></div>
      <div class="bottom-row">
        <div class="orb-wrap"><div id="orb" class="orb"></div></div>
        <button id="end-btn" class="danger">End session</button>
      </div>
    </div>
  </section>

  <section id="summary" class="card hidden">
    <h2>Session summary</h2>
    <div class="grid two">
      <div class="card" style="padding:16px;">
        <div class="meta" id="summary-meta"></div>
      </div>
      <div class="card" style="padding:16px;">
        <strong>Score metrics</strong>
        <div class="metrics" id="profile-metrics" style="margin-top:12px;"></div>
      </div>
    </div>
    <div class="card" style="padding:16px;margin-top:16px;">
      <strong>Personality snapshot</strong>
      <div class="meta" id="personality-section" style="margin-top:8px;"></div>
    </div>
    <div class="card" style="padding:16px;margin-top:16px;">
      <strong>Cognitive profile</strong>
      <div class="meta" id="cognitive-section" style="margin-top:8px;"></div>
    </div>
    <div class="card" style="padding:16px;margin-top:16px;">
      <strong>Emotional profile</strong>
      <div class="meta" id="emotional-section" style="margin-top:8px;"></div>
    </div>
    <div class="card" style="padding:16px;margin-top:16px;">
      <strong>Behavioral insights</strong>
      <div class="meta" id="behavioral-section" style="margin-top:8px;"></div>
    </div>
    <div class="card" style="padding:16px;margin-top:16px;">
      <strong>Conversation analysis</strong>
      <div class="meta" id="conversation-section" style="margin-top:8px;"></div>
    </div>
    <div class="card" style="padding:16px;margin-top:16px;">
      <strong>Recommendations</strong>
      <div id="recommendations" class="meta" style="margin-top:8px;"></div>
    </div>
    <div class="card" style="padding:16px;margin-top:16px;">
      <strong>Full transcript</strong>
      <div class="meta" id="summary-transcript" style="margin-top:8px;white-space:pre-wrap;"></div>
    </div>
    <div style="margin-top:18px;">
      <button id="new-btn">New session</button>
    </div>
  </section>
</div>
<audio id="ai-audio" autoplay></audio>
<div class="toast" id="toast"></div>
<script>
const screens = {welcome:document.getElementById('welcome'),live:document.getElementById('live'),summary:document.getElementById('summary')};
const statusText = document.getElementById('status-text');
const timerEl = document.getElementById('timer');
const transcriptEl = document.getElementById('transcript');
const orb = document.getElementById('orb');
const preview = document.getElementById('preview');
const previewWrap = document.getElementById('preview-wrap');
const aiAudio = document.getElementById('ai-audio');
const toast = document.getElementById('toast');
const caseStudyText = document.getElementById('case-study-text');
const profileMetrics = document.getElementById('profile-metrics');
const personalitySection = document.getElementById('personality-section');
const cognitiveSection = document.getElementById('cognitive-section');
const emotionalSection = document.getElementById('emotional-section');
const behavioralSection = document.getElementById('behavioral-section');
const conversationSection = document.getElementById('conversation-section');
const recommendationsEl = document.getElementById('recommendations');
let pc, dataChannel, mediaStream, recorder, recordedChunks = [];
let timerStart, timerHandle, currentAiEntry = null;
let sessionMeta = null;

function showScreen(name){Object.values(screens).forEach(s=>s.classList.add('hidden'));screens[name].classList.remove('hidden');}
function setStatus(text){statusText.textContent = text;}
function showToast(msg){toast.textContent = msg;toast.style.display='block';setTimeout(()=>toast.style.display='none',4000);}
function formatTime(ms){const s=Math.floor(ms/1000);const m=String(Math.floor(s/60)).padStart(2,'0');const r=String(s%60).padStart(2,'0');return `${m}:${r}`;}
function addEntry(role,text){
  const entry=document.createElement('div');
  entry.className=`entry ${role}`;
  const tag=document.createElement('div');
  tag.className='tag';
  tag.textContent=role==='ai'?'Counsellor':'Student';
  const body=document.createElement('div');
  body.className='body';
  body.textContent=text;
  entry.append(tag,body);
  transcriptEl.append(entry);
  transcriptEl.scrollTop=transcriptEl.scrollHeight;
  return {body};
}
function updateTimer(){timerEl.textContent=formatTime(Date.now()-timerStart);}

async function startSession(){
  const name=document.getElementById('student-name').value.trim()||'Student';
  const className=document.getElementById('class-name').value.trim()||'Class';
  const scenario=document.getElementById('case-study').value;
  sessionMeta={name,className,scenario,start:new Date()};
  recordedChunks = [];
  showScreen('live');
  setStatus('Connecting...');
  caseStudyText.textContent = scenario || 'No case study loaded.';

  try{mediaStream = await navigator.mediaDevices.getUserMedia({audio:true,video:true});}
  catch(err){mediaStream = await navigator.mediaDevices.getUserMedia({audio:true,video:false});}

  preview.srcObject = mediaStream;
  if (mediaStream.getVideoTracks().length === 0) {previewWrap.style.display='none';}

  recorder = new MediaRecorder(mediaStream);
  recorder.ondataavailable = e => { if (e.data.size) recordedChunks.push(e.data); };
  recorder.start(1000);

  pc = new RTCPeerConnection({iceServers:[{urls:"stun:stun.l.google.com:19302"}]});
  const audioTransceiver = pc.addTransceiver('audio', {direction:'sendrecv'});
  const micTrack = mediaStream.getAudioTracks()[0];
  await audioTransceiver.sender.replaceTrack(micTrack);

  pc.ontrack = e => {aiAudio.srcObject = e.streams[0];aiAudio.play().catch(()=>{});};

  dataChannel = pc.createDataChannel('oai-events');
  dataChannel.onmessage = handleEventMessage;
  dataChannel.onopen = () => {
    const sessionUpdate = {type:'session.update',session:{turn_detection:{type:'server_vad',threshold:0.5,silence_duration_ms:500},input_audio_transcription:{model:'whisper-1'}}};
    dataChannel.send(JSON.stringify(sessionUpdate));
    console.log('[CounselAI] session.update sent:', JSON.stringify(sessionUpdate.session));
    setTimeout(()=>{
      const instructions = `Warmly greet ${name} by name, read the case study aloud, then ask: "Iss situation mein tum kya karte? Tell me what comes to your mind first." Case study: ${scenario}`;
      dataChannel.send(JSON.stringify({type:'response.create',response:{instructions}}));
    },300);
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await waitForIce(pc);

  const resp = await fetch(`/api/rtc-connect?scenario=${encodeURIComponent(scenario)}`, {method:'POST',body:pc.localDescription.sdp,headers:{'Content-Type':'application/sdp'}});
  if (resp.status !== 200 && resp.status !== 201) throw new Error(`RTC connect failed (${resp.status})`);
  const answerSdp = await resp.text();
  await pc.setRemoteDescription({type:'answer', sdp: answerSdp});

  timerStart = Date.now();
  timerHandle = setInterval(updateTimer, 500);
  setStatus('Listening...');
}

function handleEventMessage(ev){
  let msg;try{msg=JSON.parse(ev.data);}catch{return;}
  switch(msg.type){
    case 'response.audio_transcript.delta':
      orb.classList.add('speaking');
      if (!currentAiEntry) {
        const created = addEntry('ai','');
        currentAiEntry = created.body;
      }
      currentAiEntry.textContent += msg.delta || '';
      transcriptEl.scrollTop = transcriptEl.scrollHeight;
      setStatus('Speaking...');
      break;
    case 'response.audio_transcript.done':
      if (currentAiEntry) {
        currentAiEntry.textContent = msg.transcript || currentAiEntry.textContent;
        currentAiEntry = null;
      }
      break;
    case 'response.done':
      orb.classList.remove('speaking');
      setStatus('Listening...');
      break;
    case 'conversation.item.input_audio_transcription.completed':
      addEntry('student', msg.transcript || '');
      break;
    case 'input_audio_buffer.speech_started':
      setStatus('Listening...');
      break;
    case 'input_audio_buffer.speech_stopped':
      setStatus('Processing...');
      break;
    case 'input_audio_buffer.committed':
      console.log('[CounselAI] input audio committed for transcription.');
      break;
    case 'session.updated':
      console.log('[CounselAI] Session config accepted:', JSON.stringify(msg.session || {}));
      break;
    case 'error':
      showToast(msg.message || 'An error occurred.');
      break;
  }
}

function waitForIce(pc){
  if (pc.iceGatheringState === 'complete') return Promise.resolve();
  return new Promise(resolve=>{
    const check=()=>{ if (pc.iceGatheringState === 'complete'){ pc.removeEventListener('icegatheringstatechange', check); resolve(); } };
    pc.addEventListener('icegatheringstatechange', check);
  });
}

function buildMetrics(profile){
  profileMetrics.innerHTML = '';
  const metrics = [];
  const pick = (label, value) => { if (value === undefined || value === null || value === '') return; metrics.push({label,value}); };
  pick('Critical Thinking', profile?.cognitive_profile?.critical_thinking);
  pick('Perspective Taking', profile?.cognitive_profile?.perspective_taking);
  pick('EQ Score', profile?.emotional_profile?.eq_score);
  pick('Confidence', profile?.behavioral_insights?.confidence);
  if (metrics.length === 0) {
    const fallback = document.createElement('div');
    fallback.className = 'meta';
    fallback.textContent = 'No numeric scores available.';
    profileMetrics.appendChild(fallback);
    return;
  }
  metrics.forEach(m=>{
    const card=document.createElement('div');
    card.className='metric';
    const label=document.createElement('div');
    label.className='label';
    label.textContent=m.label;
    const value=document.createElement('div');
    value.className='value';
    value.textContent=m.value;
    card.append(label,value);
    profileMetrics.appendChild(card);
  });
}

function renderRecommendations(profile){
  recommendationsEl.innerHTML = '';
  const list = Array.isArray(profile?.recommendations) ? profile.recommendations : [];
  if (list.length === 0) {recommendationsEl.textContent = 'No recommendations returned.';return;}
  const ul = document.createElement('ul');
  ul.style.margin = '0';
  ul.style.paddingLeft = '18px';
  list.forEach(item=>{const li=document.createElement('li');li.textContent=item;ul.appendChild(li);});
  recommendationsEl.appendChild(ul);
}

function renderSection(sectionEl, items){
  sectionEl.innerHTML = '';
  if (!items.length) {sectionEl.textContent = 'No data returned.';return;}
  const list = document.createElement('div');
  items.forEach(item=>{
    const row = document.createElement('div');
    row.style.marginBottom = '8px';
    row.textContent = item;
    list.appendChild(row);
  });
  sectionEl.appendChild(list);
}

function renderProfileSections(profile){
  const traits = Array.isArray(profile?.personality_snapshot?.traits) ? profile.personality_snapshot.traits : [];
  const personalityItems = [
    traits.length ? `Traits: ${traits.join(', ')}` : '',
    profile?.personality_snapshot?.communication_style ? `Communication style: ${profile.personality_snapshot.communication_style}` : '',
    profile?.personality_snapshot?.decision_making ? `Decision making: ${profile.personality_snapshot.decision_making}` : '',
  ].filter(Boolean);
  renderSection(personalitySection, personalityItems);

  const cognitiveItems = [
    profile?.cognitive_profile?.moral_reasoning_stage ? `Moral reasoning stage: ${profile.cognitive_profile.moral_reasoning_stage}` : '',
    profile?.cognitive_profile?.problem_solving_style ? `Problem solving: ${profile.cognitive_profile.problem_solving_style}` : '',
  ].filter(Boolean);
  renderSection(cognitiveSection, cognitiveItems);

  const anxietyMarkers = Array.isArray(profile?.emotional_profile?.anxiety_markers) ? profile.emotional_profile.anxiety_markers : [];
  const emotionalItems = [
    profile?.emotional_profile?.empathy_level ? `Empathy level: ${profile.emotional_profile.empathy_level}` : '',
    profile?.emotional_profile?.stress_response ? `Stress response: ${profile.emotional_profile.stress_response}` : '',
    anxietyMarkers.length ? `Anxiety markers: ${anxietyMarkers.join(', ')}` : '',
    profile?.emotional_profile?.emotional_vocabulary ? `Emotional vocabulary: ${profile.emotional_profile.emotional_vocabulary}` : '',
  ].filter(Boolean);
  renderSection(emotionalSection, emotionalItems);

  const behavioralItems = [
    profile?.behavioral_insights?.leadership_potential ? `Leadership potential: ${profile.behavioral_insights.leadership_potential}` : '',
    profile?.behavioral_insights?.peer_influence ? `Peer influence: ${profile.behavioral_insights.peer_influence}` : '',
    profile?.behavioral_insights?.academic_pressure ? `Academic pressure: ${profile.behavioral_insights.academic_pressure}` : '',
    profile?.behavioral_insights?.resilience ? `Resilience: ${profile.behavioral_insights.resilience}` : '',
  ].filter(Boolean);
  renderSection(behavioralSection, behavioralItems);

  const keyMoments = Array.isArray(profile?.conversation_analysis?.key_moments) ? profile.conversation_analysis.key_moments : [];
  const conversationItems = [
    profile?.conversation_analysis?.evolution_across_rounds ? `Evolution across rounds: ${profile.conversation_analysis.evolution_across_rounds}` : '',
    profile?.conversation_analysis?.consistency ? `Consistency: ${profile.conversation_analysis.consistency}` : '',
    keyMoments.length ? `Key moments: ${keyMoments.join(' | ')}` : '',
  ].filter(Boolean);
  renderSection(conversationSection, conversationItems);
}

async function endSession(){
  setStatus('Processing...');
  clearInterval(timerHandle);
  const videoBlob = await new Promise(resolve => {
    if (!recorder || recorder.state === 'inactive') return resolve(null);
    recorder.onstop = () => resolve(new Blob(recordedChunks, {type:'video/webm'}));
    recorder.stop();
  });
  if (dataChannel) dataChannel.close();
  if (pc) pc.close();
  if (mediaStream) mediaStream.getTracks().forEach(t=>t.stop());

  const duration = formatTime(Date.now()-timerStart);
  document.getElementById('summary-meta').textContent = `${sessionMeta.name} • ${sessionMeta.className} • ${duration}`;
  document.getElementById('summary-transcript').textContent = transcriptEl.textContent.trim();
  showScreen('summary');

  // Show loading state
  [personalitySection, cognitiveSection, emotionalSection, behavioralSection, conversationSection].forEach(el => el.textContent = 'Analyzing...');
  recommendationsEl.textContent = 'Generating recommendations...';
  profileMetrics.textContent = 'Computing scores...';

  try{
    const fd = new FormData();
    const safeBlob = videoBlob || new Blob([], {type:'video/webm'});
    fd.append('video', safeBlob, 'session.webm');
    // Build transcript from DOM to avoid missing data channel events.
    const finalTranscript = [];
    transcriptEl.querySelectorAll('.entry').forEach(el => {
      const role = el.classList.contains('ai') ? 'counsellor' : 'student';
      const bodyEl = el.querySelector('.body') || el.querySelector('div:last-child');
      const text = bodyEl ? bodyEl.textContent.trim() : '';
      if (text) finalTranscript.push({role, text});
    });
    const transcriptJson = JSON.stringify(finalTranscript);
    console.log('[CounselAI] transcript JSON length:', transcriptJson.length);
    console.log('[CounselAI] transcript entries:', finalTranscript.length);
    fd.append('transcript', JSON.stringify(finalTranscript));
    fd.append('student_name', sessionMeta.name);
    fd.append('student_class', sessionMeta.className);
    const resp = await fetch('/api/analyze-session', {method:'POST', body: fd});
    if (resp.ok) {
      const data = await resp.json();
      const profile = data.profile || {};
      console.log('[CounselAI] profile received:', JSON.stringify(profile).slice(0, 500));
      buildMetrics(profile);
      renderProfileSections(profile);
      renderRecommendations(profile);
    } else {
      renderSection(personalitySection, []);
      renderSection(cognitiveSection, []);
      renderSection(emotionalSection, []);
      renderSection(behavioralSection, []);
      renderSection(conversationSection, []);
      recommendationsEl.textContent = 'Analysis unavailable.';
    }
  }catch(err){ console.error('[CounselAI] Analysis error:', err);
    renderSection(personalitySection, []);
    renderSection(cognitiveSection, []);
    renderSection(emotionalSection, []);
    renderSection(behavioralSection, []);
    renderSection(conversationSection, []);
    recommendationsEl.textContent = 'Analysis unavailable.';
  }
}

document.getElementById('start-btn').addEventListener('click', ()=>startSession().catch(err=>{showToast(err.message);showScreen('welcome');}));
document.getElementById('end-btn').addEventListener('click', endSession);
document.getElementById('new-btn').addEventListener('click', ()=>{location.reload();});

(async()=>{
  try{
    const r = await fetch('/api/case-studies');
    const d = await r.json();
    const sel = document.getElementById('case-study');
    sel.innerHTML = '';
    d.case_studies.forEach(cs=>{
      const o = document.createElement('option');
      o.value = cs.scenario_text;
      o.textContent = cs.id + ' • ' + cs.title + ' (' + cs.target_class + ')';
      sel.appendChild(o);
    });
    if (sel.value) caseStudyText.textContent = sel.value;
    sel.addEventListener('change', ()=>{caseStudyText.textContent = sel.value;});
  }catch(e){showToast('Failed to load case studies');}
})();
</script>
</body>
</html>
