<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CounselAI Sessions Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a1628;--panel:#0f1f35;--panel-2:#0c1a30;--teal:#46d9d1;--blue:#2f7bf6;--text:#e6f2ff;--muted:#9bb3d3;--danger:#ff7b7b;--ok:#55d28b;--glow:0 0 30px rgba(70,217,209,.45)}
*{box-sizing:border-box}
body{margin:0;font-family:"Space Grotesk","IBM Plex Sans",system-ui,sans-serif;color:var(--text);background:radial-gradient(1200px 600px at 15% 0%,#133056 0%,transparent 60%),linear-gradient(160deg,#081223,var(--bg));min-height:100vh}
.app{max-width:1250px;margin:0 auto;padding:28px 20px 40px}
.card{background:linear-gradient(180deg,#10233e,var(--panel));border:1px solid rgba(70,217,209,.2);border-radius:20px;padding:22px;box-shadow:0 18px 60px rgba(0,0,0,.35)}
h1,h2,h3{margin:0 0 14px;letter-spacing:.3px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.links{display:flex;gap:10px;flex-wrap:wrap}
.btn{display:inline-block;border:1px solid rgba(70,217,209,.25);background:#0c1b31;color:var(--text);text-decoration:none;padding:9px 14px;border-radius:10px}
.btn:hover{border-color:var(--teal)}
.table-wrap{overflow:auto;border:1px solid rgba(47,123,246,.25);border-radius:14px;background:#0b182c}
table{width:100%;border-collapse:collapse;min-width:850px}
th,td{text-align:left;padding:12px 14px;border-bottom:1px solid rgba(47,123,246,.18)}
th{color:var(--muted);font-weight:500;font-size:.92rem;background:#0c1a30}
tr.session-row{cursor:pointer;transition:background .2s ease}
tr.session-row:hover{background:rgba(70,217,209,.08)}
.chip{display:inline-block;padding:4px 8px;border-radius:999px;font-size:.8rem;background:rgba(70,217,209,.15);border:1px solid rgba(70,217,209,.3)}
.detail{margin-top:16px;border:1px solid rgba(70,217,209,.2);border-radius:14px;background:#0b182c;padding:16px;display:none}
.detail.active{display:block}
.grid{display:grid;gap:16px}
.two{grid-template-columns:1fr 1fr}
.metrics{display:grid;gap:10px 24px;grid-template-columns:1fr 1fr}
.summary-wrap .card{padding:16px;margin-top:16px}
.summary-wrap .card.first{margin-top:0}
.transcript{margin-top:8px;max-height:340px;overflow:auto;background:#0b182c;border:1px solid rgba(47,123,246,.25);border-radius:16px;padding:14px}
.entry{padding:9px 10px;border-radius:10px;margin-bottom:8px}
.entry.student{background:rgba(70,217,209,.08);border:1px solid rgba(70,217,209,.2)}
.entry.counsellor{background:rgba(47,123,246,.12);border:1px solid rgba(47,123,246,.25)}
.role{font-size:.8rem;color:var(--muted);margin-bottom:3px}
.meta{color:var(--muted);font-size:.95rem}
.muted{color:var(--muted)}
.empty{padding:20px;color:var(--muted)}
ul{margin:0;padding-left:18px}
@media (max-width:760px){.two{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="app">
  <section class="card">
    <div class="topbar">
      <div>
        <h1>Sessions Dashboard</h1>
        <div class="muted">All persisted counselling sessions</div>
      </div>
      <div class="links">
        <a class="btn" href="/">Live Session</a>
      </div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Student</th>
            <th>Class</th>
            <th>Date</th>
            <th>Duration</th>
            <th>Dominant Emotion</th>
            <th>Confidence Score</th>
            <th>Source</th>
          </tr>
        </thead>
        <tbody id="sessions-body">
          <tr><td colspan="7" class="empty">Loading sessions...</td></tr>
        </tbody>
      </table>
    </div>

    <div id="session-detail" class="detail"></div>
  </section>
</div>

<script>
const sessionsBody = document.getElementById('sessions-body');
const detailEl = document.getElementById('session-detail');

function escapeHtml(text){
  return String(text || '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');
}

function formatDate(value){
  if (!value) return '-';
  const d = new Date(value);
  if (Number.isNaN(d.getTime())) return value;
  return d.toLocaleString();
}

function formatDuration(seconds){
  if (seconds == null || Number.isNaN(Number(seconds))) return '-';
  const s = Math.max(0, Number(seconds));
  const mm = String(Math.floor(s / 60)).padStart(2, '0');
  const ss = String(Math.floor(s % 60)).padStart(2, '0');
  return `${mm}:${ss}`;
}

function confidence(value){
  if (value == null || Number.isNaN(Number(value))) return '-';
  return `${Number(value).toFixed(1)}%`;
}

function renderTranscript(entries){
  if (!Array.isArray(entries) || entries.length === 0) return '<div class="muted">No transcript available.</div>';
  return entries.map((e)=>{
    const role = (e.role || 'student').toLowerCase();
    const css = role === 'counsellor' ? 'counsellor' : 'student';
    const label = role === 'counsellor' ? 'Counsellor' : 'Student';
    const text = escapeHtml(e.text || '');
    return `<div class="entry ${css}"><div class="role">${label}</div><div>${text || '(empty)'}</div></div>`;
  }).join('');
}

function renderMetricBars(profile){
  const metrics = [
    {label:'Critical Thinking', value: profile?.cognitive_profile?.critical_thinking},
    {label:'Perspective Taking', value: profile?.cognitive_profile?.perspective_taking},
    {label:'EQ Score', value: profile?.emotional_profile?.eq_score},
    {label:'Confidence', value: profile?.behavioral_insights?.confidence},
  ].filter((m)=>m.value != null);
  if (!metrics.length) return '<div class="muted">No scores available.</div>';
  return metrics.map((m)=>{
    const pct = Math.min(100, (Number(m.value) / 10) * 100);
    const color = pct >= 70 ? '#2ecc71' : pct >= 40 ? '#f1c40f' : '#e74c3c';
    return `<div style="margin-bottom:4px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:4px;">
        <span style="font-size:.9rem;">${escapeHtml(m.label)}</span>
        <strong>${escapeHtml(String(m.value))}/10</strong>
      </div>
      <div style="width:100%;height:8px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden;">
        <div style="height:100%;border-radius:4px;background:${color};width:${pct}%;"></div>
      </div>
    </div>`;
  }).join('');
}

function renderRecommendations(profile){
  const list = Array.isArray(profile?.recommendations) ? profile.recommendations : [];
  if (!list.length) return '<div class="muted">No recommendations returned.</div>';
  return `<ul>${list.map((item)=>`<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
}

function renderRows(items){
  if (!items.length) return 'No data returned.';
  return items.map((item)=>`<div style="margin-bottom:8px;">${escapeHtml(item)}</div>`).join('');
}

function renderProfileSections(profile){
  const traits = Array.isArray(profile?.personality_snapshot?.traits) ? profile.personality_snapshot.traits : [];
  const personalityItems = [
    traits.length ? `Traits: ${traits.join(', ')}` : '',
    profile?.personality_snapshot?.communication_style ? `Communication style: ${profile.personality_snapshot.communication_style}` : '',
    profile?.personality_snapshot?.decision_making ? `Decision making: ${profile.personality_snapshot.decision_making}` : '',
  ].filter(Boolean);

  const cognitiveItems = [
    profile?.cognitive_profile?.moral_reasoning_stage ? `Moral reasoning stage: ${profile.cognitive_profile.moral_reasoning_stage}` : '',
    profile?.cognitive_profile?.problem_solving_style ? `Problem solving: ${profile.cognitive_profile.problem_solving_style}` : '',
    profile?.cognitive_profile?.problem_solving ? `Problem solving: ${profile.cognitive_profile.problem_solving}` : '',
  ].filter(Boolean);

  const anxietyMarkers = Array.isArray(profile?.emotional_profile?.anxiety_markers) ? profile.emotional_profile.anxiety_markers : [];
  const emotionalItems = [
    profile?.emotional_profile?.empathy_level ? `Empathy level: ${profile.emotional_profile.empathy_level}` : '',
    profile?.emotional_profile?.emotional_regulation ? `Emotional regulation: ${profile.emotional_profile.emotional_regulation}` : '',
    profile?.emotional_profile?.self_awareness ? `Self awareness: ${profile.emotional_profile.self_awareness}` : '',
    profile?.emotional_profile?.stress_response ? `Stress response: ${profile.emotional_profile.stress_response}` : '',
    anxietyMarkers.length ? `Anxiety markers: ${anxietyMarkers.join(', ')}` : '',
  ].filter(Boolean);

  const behavioralItems = [
    profile?.behavioral_insights?.confidence_level ? `Confidence level: ${profile.behavioral_insights.confidence_level}` : '',
    profile?.behavioral_insights?.social_dynamics ? `Social dynamics: ${profile.behavioral_insights.social_dynamics}` : '',
    profile?.behavioral_insights?.response_pattern ? `Response pattern: ${profile.behavioral_insights.response_pattern}` : '',
    profile?.behavioral_insights?.leadership_potential ? `Leadership potential: ${profile.behavioral_insights.leadership_potential}` : '',
    profile?.behavioral_insights?.peer_influence ? `Peer influence: ${profile.behavioral_insights.peer_influence}` : '',
  ].filter(Boolean);

  const conversationKeyMoments = Array.isArray(profile?.conversation_analysis?.key_moments) ? profile.conversation_analysis.key_moments : [];
  const conversationItems = [
    profile?.conversation_analysis?.evolution_across_rounds ? `Evolution across rounds: ${profile.conversation_analysis.evolution_across_rounds}` : '',
    profile?.conversation_analysis?.consistency ? `Consistency: ${profile.conversation_analysis.consistency}` : '',
    conversationKeyMoments.length ? `Key moments: ${conversationKeyMoments.join(' | ')}` : '',
  ].filter(Boolean);

  const moments = Array.isArray(profile?.key_moments) ? profile.key_moments : [];
  const keyMomentsHtml = moments.length
    ? moments.map((m)=>{
        if (typeof m === 'string') {
          return `<div style="margin-bottom:12px;padding:10px;border-left:3px solid #e8c547;background:rgba(232,197,71,0.08);border-radius:4px;">${escapeHtml(m)}</div>`;
        }
        return `<div style="margin-bottom:12px;padding:10px;border-left:3px solid #e8c547;background:rgba(232,197,71,0.08);border-radius:4px;">
          <div style="font-style:italic;margin-bottom:4px;">"${escapeHtml(m.quote || '')}"</div>
          <div style="color:#aaa;font-size:0.9em;">${escapeHtml(m.insight || '')}</div>
        </div>`;
      }).join('')
    : 'No key moments identified.';

  const flags = Array.isArray(profile?.red_flags) ? profile.red_flags : [];
  const redFlagsHtml = flags.length
    ? flags.map((f)=>`<div style="margin-bottom:6px;padding:6px 10px;background:rgba(231,76,60,0.1);border-radius:4px;">⚠ ${escapeHtml(f)}</div>`).join('')
    : 'No red flags identified.';

  return {
    personality: renderRows(personalityItems),
    cognitive: renderRows(cognitiveItems),
    emotional: renderRows(emotionalItems),
    behavioral: renderRows(behavioralItems),
    conversation: renderRows(conversationItems),
    keyMoments: keyMomentsHtml,
    redFlags: redFlagsHtml,
    summary: escapeHtml(profile?.summary || 'No summary available.'),
  };
}

function renderFaceAnalysis(faceData){
  if (!faceData?.summary) return 'No face data captured (camera may not have been available).';
  const s = faceData.summary;
  const items = [
    s.dominant_emotion ? `Dominant emotion: ${s.dominant_emotion}` : '',
    s.eye_contact_score != null ? `Eye contact score: ${(s.eye_contact_score * 100).toFixed(0)}%` : '',
    s.facial_tension_score != null ? `Facial tension: ${(s.facial_tension_score * 100).toFixed(0)}%` : '',
    s.smile_count != null ? `Smile count: ${s.smile_count}` : '',
  ].filter(Boolean);
  if (s.emotion_distribution) {
    const dist = Object.entries(s.emotion_distribution)
      .sort((a, b) => b[1] - a[1])
      .slice(0, 4)
      .map(([k, v]) => `${k}: ${Number(v).toFixed(1)}%`)
      .join(', ');
    items.push(`Emotion distribution: ${dist}`);
  }
  return items.map((i)=>`<div style="margin-bottom:6px;">${escapeHtml(i)}</div>`).join('') || 'No face data captured.';
}

function renderVoiceAnalysis(voiceData){
  if (!voiceData?.speech_rate) return 'No voice data captured.';
  const items = [
    voiceData.speech_rate.words_per_minute ? `Speech rate: ${voiceData.speech_rate.words_per_minute.toFixed(0)} WPM` : '',
    voiceData.pauses ? `Pauses: ${voiceData.pauses.count} (total ${voiceData.pauses.total_duration.toFixed(1)}s)` : '',
    voiceData.pitch?.mean_hz ? `Pitch: ${voiceData.pitch.mean_hz.toFixed(0)} Hz (variation: ${(voiceData.pitch.variation * 100).toFixed(0)}%)` : '',
    voiceData.volume?.pattern ? `Volume pattern: ${voiceData.volume.pattern}` : '',
    voiceData.overall_confidence_score != null ? `Voice confidence score: ${(voiceData.overall_confidence_score * 100).toFixed(0)}%` : '',
  ].filter(Boolean);
  return items.map((i)=>`<div style="margin-bottom:6px;">${escapeHtml(i)}</div>`).join('') || 'No voice data captured.';
}

async function openSession(id){
  const res = await fetch(`/api/sessions/${id}`);
  const data = await res.json();
  if (!res.ok) {
    detailEl.classList.add('active');
    detailEl.innerHTML = `<div class="muted">Failed to load session: ${data.error || 'Unknown error'}</div>`;
    return;
  }

  const profile = data.profile || {};
  const face = data.face_analysis || {};
  const voice = data.voice_analysis || {};
  const student = data.student_info || {};
  const sections = renderProfileSections(profile);

  detailEl.classList.add('active');
  detailEl.innerHTML = `
    <div class="summary-wrap">
      <h2 style="margin-bottom:16px;">Session #${data.id} summary</h2>
      <div class="grid two">
        <div class="card first">
          <div class="meta">${escapeHtml(student.name || '-')} • ${escapeHtml(student.class || '-')} • ${formatDuration(data.duration_seconds)}</div>
        </div>
        <div class="card first">
          <strong>Score metrics</strong>
          <div class="metrics" style="margin-top:12px;">${renderMetricBars(profile)}</div>
        </div>
      </div>
      <div class="card">
        <strong>Personality snapshot</strong>
        <div class="meta" style="margin-top:8px;">${sections.personality}</div>
      </div>
      <div class="card">
        <strong>Cognitive profile</strong>
        <div class="meta" style="margin-top:8px;">${sections.cognitive}</div>
      </div>
      <div class="card">
        <strong>Emotional profile</strong>
        <div class="meta" style="margin-top:8px;">${sections.emotional}</div>
      </div>
      <div class="card">
        <strong>Behavioral insights</strong>
        <div class="meta" style="margin-top:8px;">${sections.behavioral}</div>
      </div>
      <div class="card">
        <strong>Conversation analysis</strong>
        <div class="meta" style="margin-top:8px;">${sections.conversation}</div>
      </div>
      <div class="card">
        <strong>Recommendations</strong>
        <div class="meta" style="margin-top:8px;">${renderRecommendations(profile)}</div>
      </div>
      <div class="card">
        <strong style="color:#e8c547;">Key moments</strong>
        <div class="meta" style="margin-top:8px;">${sections.keyMoments}</div>
      </div>
      <div class="card">
        <strong style="color:#e74c3c;">Red flags</strong>
        <div class="meta" style="margin-top:8px;">${sections.redFlags}</div>
      </div>
      <div class="card">
        <strong>Summary</strong>
        <div class="meta" style="margin-top:8px;">${sections.summary}</div>
      </div>
      <div class="card">
        <strong>🎭 Face Analysis</strong>
        <div class="meta" style="margin-top:8px;">${renderFaceAnalysis(face)}</div>
      </div>
      <div class="card">
        <strong>🎤 Voice Analysis</strong>
        <div class="meta" style="margin-top:8px;">${renderVoiceAnalysis(voice)}</div>
      </div>
      <div class="card">
        <strong>Full transcript</strong>
        <div class="transcript">${renderTranscript(data.transcript)}</div>
      </div>
    </div>
  `;
}

async function loadSessions(){
  try {
    const res = await fetch('/api/sessions');
    const payload = await res.json();
    const sessions = Array.isArray(payload.sessions) ? payload.sessions : [];
    if (!sessions.length) {
      sessionsBody.innerHTML = '<tr><td colspan="7" class="empty">No sessions found yet.</td></tr>';
      return;
    }
    sessionsBody.innerHTML = sessions.map((s)=>`
      <tr class="session-row" data-id="${s.id}">
        <td>${escapeHtml(s.student_name || 'Student')}</td>
        <td>${escapeHtml(s.student_class || '-')}</td>
        <td>${formatDate(s.session_end_time || s.created_at)}</td>
        <td>${formatDuration(s.duration_seconds)}</td>
        <td><span class="chip">${escapeHtml(s.dominant_emotion || 'unknown')}</span></td>
        <td>${confidence(s.confidence_score)}</td>
        <td>${escapeHtml(s.source || '-')}</td>
      </tr>
    `).join('');

    document.querySelectorAll('.session-row').forEach((row)=>{
      row.addEventListener('click', ()=>openSession(row.dataset.id));
    });
  } catch (err) {
    sessionsBody.innerHTML = '<tr><td colspan="7" class="empty">Failed to load sessions.</td></tr>';
  }
}

loadSessions();
</script>
</body>
</html>
