<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Dashboard — CounselAI</title>
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f0a1e;--surface:rgba(255,255,255,.06);--surface-2:rgba(255,255,255,.03);--border:rgba(255,255,255,.08);--purple:#7c3aed;--indigo:#6366f1;--violet:#8b5cf6;--teal:#2dd4bf;--rose:#fb7185;--amber:#fbbf24;--green:#34d399;--text:#f1f0f9;--muted:#9ca3af;--glass:saturate(180%) blur(20px);--grad:linear-gradient(135deg,#7c3aed,#6366f1)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 0%,rgba(124,58,237,.15),transparent),radial-gradient(ellipse 60% 40% at 80% 100%,rgba(99,102,241,.1),transparent);pointer-events:none;z-index:0}
.app{position:relative;z-index:1;max-width:1300px;margin:0 auto;padding:24px 20px 48px}
.glass{background:var(--surface);backdrop-filter:var(--glass);-webkit-backdrop-filter:var(--glass);border:1px solid var(--border);border-radius:16px;padding:20px}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.topbar h1{font-size:1.5rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.topbar .sub{color:var(--muted);font-size:.85rem;margin-top:2px}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:.85rem;font-weight:500;text-decoration:none;color:var(--text);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .2s}
.btn:hover{border-color:var(--violet);background:rgba(139,92,246,.12)}
.btn-primary{background:rgba(124,58,237,.2);border-color:rgba(124,58,237,.4)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:14px;margin-bottom:24px}
.stat-card{text-align:center;padding:20px 16px}
.stat-card .val{font-size:2rem;font-weight:700;background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-card .label{font-size:.78rem;color:var(--muted);margin-top:4px;text-transform:uppercase;letter-spacing:.5px}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:500}
.chip-ok{background:rgba(52,211,153,.12);color:var(--green);border:1px solid rgba(52,211,153,.25)}
.chip-warn{background:rgba(251,191,36,.12);color:var(--amber);border:1px solid rgba(251,191,36,.25)}
.chip-danger{background:rgba(251,113,133,.12);color:var(--rose);border:1px solid rgba(251,113,133,.25)}
.table-wrap{overflow-x:auto;border-radius:14px;border:1px solid var(--border);background:var(--surface-2)}
table{width:100%;border-collapse:collapse;min-width:800px}
th,td{text-align:left;padding:11px 14px;border-bottom:1px solid var(--border)}
th{color:var(--muted);font-weight:500;font-size:.8rem;text-transform:uppercase;letter-spacing:.4px;background:rgba(255,255,255,.02)}
tr.row{cursor:pointer;transition:background .2s}
tr.row:hover{background:rgba(139,92,246,.06)}
.detail{margin-top:20px;display:none}
.detail.active{display:block}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.metrics-bar{margin-bottom:6px}
.metrics-bar .bar-label{display:flex;justify-content:space-between;font-size:.85rem;margin-bottom:3px}
.metrics-bar .track{height:6px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden}
.metrics-bar .fill{height:100%;border-radius:4px;background:var(--grad);transition:width .4s}
.transcript{max-height:340px;overflow-y:auto;margin-top:8px;padding:12px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border)}
.entry{padding:8px 12px;border-radius:10px;margin-bottom:6px}
.entry.student{background:rgba(45,212,191,.06);border:1px solid rgba(45,212,191,.15)}
.entry.counsellor{background:rgba(124,58,237,.08);border:1px solid rgba(124,58,237,.2)}
.entry .role{font-size:.72rem;color:var(--muted);margin-bottom:2px;text-transform:uppercase;letter-spacing:.3px}
.muted{color:var(--muted)}.empty{padding:20px;color:var(--muted)}
ul{margin:0;padding-left:18px}
.card-inner{padding:16px;margin-bottom:12px;border-radius:12px;background:var(--surface-2);border:1px solid var(--border)}
@media(max-width:768px){.grid-2{grid-template-columns:1fr}.stats-row{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div><h1>🔮 CounselAI Admin</h1><div class="sub">Session analytics &amp; student insights</div></div>
    <div class="nav">
      <a class="btn" href="/">Live Session</a>
      <a class="btn" href="/api/v1/dashboard/counsellor">Counsellor</a>
    </div>
  </div>

  <div class="stats-row" id="stats-row">
    <div class="glass stat-card"><div class="val" id="st-total">—</div><div class="label">Total Sessions</div></div>
    <div class="glass stat-card"><div class="val" id="st-students">—</div><div class="label">Students</div></div>
    <div class="glass stat-card"><div class="val" id="st-flags">—</div><div class="label">Risk Alerts</div></div>
    <div class="glass stat-card"><div class="val" id="st-avg">—</div><div class="label">Avg Duration</div></div>
  </div>

  <div class="glass" style="margin-bottom:20px">
    <h2 style="font-size:1.1rem;margin-bottom:14px">Recent Sessions</h2>
    <div class="table-wrap">
      <table>
        <thead><tr><th>Student</th><th>Class</th><th>Date</th><th>Duration</th><th>Emotion</th><th>Confidence</th><th>Source</th></tr></thead>
        <tbody id="sessions-body"><tr><td colspan="7" class="empty">Loading sessions…</td></tr></tbody>
      </table>
    </div>
  </div>

  <div id="session-detail" class="detail"></div>
</div>

<script>
const sessionsBody=document.getElementById('sessions-body'),detailEl=document.getElementById('session-detail');
function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(v){if(!v)return'—';const d=new Date(v);return isNaN(d)?v:d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric',hour:'2-digit',minute:'2-digit'})}
function fmtDur(s){if(s==null||isNaN(+s))return'—';s=Math.max(0,+s);return`${String(Math.floor(s/60)).padStart(2,'0')}:${String(Math.floor(s%60)).padStart(2,'0')}`}
function conf(v){return v==null||isNaN(+v)?'—':`${(+v).toFixed(1)}%`}

function renderTranscript(entries){
  if(!Array.isArray(entries)||!entries.length)return'<div class="muted">No transcript available.</div>';
  return entries.map(e=>{const r=(e.role||'student').toLowerCase();return`<div class="entry ${r==='counsellor'?'counsellor':'student'}"><div class="role">${r==='counsellor'?'Counsellor':'Student'}</div><div>${esc(e.text)||'(empty)'}</div></div>`}).join('')}

function metricBars(p){
  const m=[{l:'Critical Thinking',v:p?.cognitive_profile?.critical_thinking},{l:'Perspective Taking',v:p?.cognitive_profile?.perspective_taking},{l:'EQ Score',v:p?.emotional_profile?.eq_score},{l:'Confidence',v:p?.behavioral_insights?.confidence}].filter(x=>x.v!=null);
  if(!m.length)return'<div class="muted">No scores available.</div>';
  return m.map(x=>{const pct=Math.min(100,(+x.v/10)*100);return`<div class="metrics-bar"><div class="bar-label"><span>${esc(x.l)}</span><strong>${esc(x.v)}/10</strong></div><div class="track"><div class="fill" style="width:${pct}%"></div></div></div>`}).join('')}

function renderRecs(p){const l=Array.isArray(p?.recommendations)?p.recommendations:[];return l.length?`<ul>${l.map(i=>`<li>${esc(i)}</li>`).join('')}</ul>`:'<div class="muted">No recommendations.</div>'}

function renderRows(items){return items.map(i=>`<div style="margin-bottom:6px">${esc(i)}</div>`).join('')||'—'}

function profileSections(p){
  const traits=Array.isArray(p?.personality_snapshot?.traits)?p.personality_snapshot.traits:[];
  const pers=[traits.length?`Traits: ${traits.join(', ')}`:'',p?.personality_snapshot?.communication_style?`Communication: ${p.personality_snapshot.communication_style}`:'',p?.personality_snapshot?.decision_making?`Decisions: ${p.personality_snapshot.decision_making}`:''].filter(Boolean);
  const cog=[p?.cognitive_profile?.moral_reasoning_stage?`Moral reasoning: ${p.cognitive_profile.moral_reasoning_stage}`:'',p?.cognitive_profile?.problem_solving_style?`Problem solving: ${p.cognitive_profile.problem_solving_style}`:''].filter(Boolean);
  const anx=Array.isArray(p?.emotional_profile?.anxiety_markers)?p.emotional_profile.anxiety_markers:[];
  const emo=[p?.emotional_profile?.empathy_level?`Empathy: ${p.emotional_profile.empathy_level}`:'',p?.emotional_profile?.emotional_regulation?`Regulation: ${p.emotional_profile.emotional_regulation}`:'',p?.emotional_profile?.stress_response?`Stress response: ${p.emotional_profile.stress_response}`:'',anx.length?`Anxiety markers: ${anx.join(', ')}`:''].filter(Boolean);
  const beh=[p?.behavioral_insights?.confidence_level?`Confidence: ${p.behavioral_insights.confidence_level}`:'',p?.behavioral_insights?.social_dynamics?`Social: ${p.behavioral_insights.social_dynamics}`:'',p?.behavioral_insights?.leadership_potential?`Leadership: ${p.behavioral_insights.leadership_potential}`:''].filter(Boolean);
  const flags=Array.isArray(p?.red_flags)?p.red_flags:[];
  const flagsHtml=flags.length?flags.map(f=>`<div style="padding:6px 10px;background:rgba(251,113,133,.08);border-radius:8px;margin-bottom:4px">⚠ ${esc(f)}</div>`).join(''):'No red flags.';
  return{personality:renderRows(pers),cognitive:renderRows(cog),emotional:renderRows(emo),behavioral:renderRows(beh),redFlags:flagsHtml,summary:esc(p?.summary||'No summary available.')}}

function faceAnalysis(f){if(!f?.summary)return'No face data captured.';const s=f.summary;const items=[s.dominant_emotion?`Dominant emotion: ${s.dominant_emotion}`:'',s.eye_contact_score!=null?`Eye contact: ${(s.eye_contact_score*100).toFixed(0)}%`:'',s.smile_count!=null?`Smiles: ${s.smile_count}`:''].filter(Boolean);return items.map(i=>`<div style="margin-bottom:4px">${esc(i)}</div>`).join('')||'No face data.'}
function voiceAnalysis(v){if(!v?.speech_rate)return'No voice data captured.';const items=[v.speech_rate.words_per_minute?`Speech: ${v.speech_rate.words_per_minute.toFixed(0)} WPM`:'',v.pitch?.mean_hz?`Pitch: ${v.pitch.mean_hz.toFixed(0)} Hz`:'',v.overall_confidence_score!=null?`Confidence: ${(v.overall_confidence_score*100).toFixed(0)}%`:''].filter(Boolean);return items.map(i=>`<div style="margin-bottom:4px">${esc(i)}</div>`).join('')||'No voice data.'}

async function openSession(id){
  const res=await fetch(`/api/sessions/${id}`);const data=await res.json();
  if(!res.ok){detailEl.classList.add('active');detailEl.innerHTML=`<div class="glass"><div class="muted">Failed to load: ${data.error||'Unknown'}</div></div>`;return}
  const p=data.profile||{},sec=profileSections(p),stu=data.student_info||{};
  detailEl.classList.add('active');
  detailEl.innerHTML=`<div class="glass"><h2 style="font-size:1.15rem;margin-bottom:16px">Session #${data.id}</h2>
    <div class="grid-2"><div class="card-inner"><div class="muted">${esc(stu.name||'—')} · ${esc(stu.class||'—')} · ${fmtDur(data.duration_seconds)}</div></div>
    <div class="card-inner"><strong>Scores</strong><div style="margin-top:8px">${metricBars(p)}</div></div></div>
    <div class="card-inner"><strong>Personality</strong><div class="muted" style="margin-top:6px">${sec.personality}</div></div>
    <div class="card-inner"><strong>Cognitive</strong><div class="muted" style="margin-top:6px">${sec.cognitive}</div></div>
    <div class="card-inner"><strong>Emotional</strong><div class="muted" style="margin-top:6px">${sec.emotional}</div></div>
    <div class="card-inner"><strong>Behavioral</strong><div class="muted" style="margin-top:6px">${sec.behavioral}</div></div>
    <div class="card-inner"><strong>Recommendations</strong><div style="margin-top:6px">${renderRecs(p)}</div></div>
    <div class="card-inner"><strong style="color:var(--rose)">Red Flags</strong><div style="margin-top:6px">${sec.redFlags}</div></div>
    <div class="card-inner"><strong>Summary</strong><div class="muted" style="margin-top:6px">${sec.summary}</div></div>
    <div class="grid-2"><div class="card-inner"><strong>🎭 Face Analysis</strong><div class="muted" style="margin-top:6px">${faceAnalysis(data.face_analysis||{})}</div></div>
    <div class="card-inner"><strong>🎤 Voice Analysis</strong><div class="muted" style="margin-top:6px">${voiceAnalysis(data.voice_analysis||{})}</div></div></div>
    <div class="card-inner"><strong>Transcript</strong><div class="transcript">${renderTranscript(data.transcript)}</div></div>
  </div>`}

async function load(){
  try{const res=await fetch('/api/sessions');const pl=await res.json();const ss=Array.isArray(pl.sessions)?pl.sessions:[];
    document.getElementById('st-total').textContent=ss.length;
    const students=new Set(ss.map(s=>s.student_name).filter(Boolean));
    document.getElementById('st-students').textContent=students.size;
    const flagCount=ss.filter(s=>s.dominant_emotion&&['angry','fear','sad','disgust'].includes(s.dominant_emotion.toLowerCase())).length;
    document.getElementById('st-flags').textContent=flagCount;
    const durations=ss.map(s=>+s.duration_seconds).filter(d=>!isNaN(d)&&d>0);
    document.getElementById('st-avg').textContent=durations.length?fmtDur(durations.reduce((a,b)=>a+b,0)/durations.length):'—';
    if(!ss.length){sessionsBody.innerHTML='<tr><td colspan="7" class="empty">No sessions yet.</td></tr>';return}
    sessionsBody.innerHTML=ss.map(s=>`<tr class="row" data-id="${s.id}"><td>${esc(s.student_name||'Student')}</td><td>${esc(s.student_class||'—')}</td><td>${fmtDate(s.session_end_time||s.created_at)}</td><td>${fmtDur(s.duration_seconds)}</td><td><span class="chip ${['angry','fear','sad'].includes((s.dominant_emotion||'').toLowerCase())?'chip-danger':'chip-ok'}">${esc(s.dominant_emotion||'unknown')}</span></td><td>${conf(s.confidence_score)}</td><td>${esc(s.source||'—')}</td></tr>`).join('');
    document.querySelectorAll('.row').forEach(r=>r.addEventListener('click',()=>openSession(r.dataset.id)));
  }catch(e){sessionsBody.innerHTML='<tr><td colspan="7" class="empty">Failed to load sessions.</td></tr>'}}
load();
</script>
</body>
</html>
