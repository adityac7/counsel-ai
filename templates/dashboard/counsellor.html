<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Counsellor Workbench — CounselAI</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root {
  --bg-primary: #FAFBFC;
  --bg-card: #FFFFFF;
  --bg-subtle: #F4F5F7;
  --bg-hover: #F0F1F4;
  --brand: #0F7B6C;
  --brand-light: #E8F5F0;
  --brand-hover: #0D6B5E;
  --brand-text: #0A5C50;
  --success: #1A7F37;
  --success-bg: #DAFBE1;
  --warning: #9A6700;
  --warning-bg: #FFF8C5;
  --danger: #CF222E;
  --danger-bg: #FFEBE9;
  --info: #0969DA;
  --info-bg: #DDF4FF;
  --text-primary: #1F2328;
  --text-secondary: #656D76;
  --text-tertiary: #8B949E;
  --border: #D0D7DE;
  --border-subtle: #E8ECEF;
  --border-hover: #B0B8C1;
  --shadow-sm: 0 1px 2px rgba(31,35,40,0.04);
  --shadow-md: 0 3px 6px rgba(31,35,40,0.04), 0 2px 4px rgba(31,35,40,0.08);
  --radius-sm: 6px;
  --radius-md: 10px;
  --radius-lg: 14px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'DM Sans', system-ui, -apple-system, sans-serif;
  color: var(--text-primary);
  background: var(--bg-primary);
  min-height: 100vh;
  font-size: 15px;
  line-height: 1.6;
}
a { color: inherit; text-decoration: none; }

/* Layout */
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 240px;
  background: var(--bg-card);
  border-right: 1px solid var(--border-subtle);
  padding: 24px 0;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  display: flex;
  flex-direction: column;
}
.sidebar-brand { font-size: 18px; font-weight: 700; color: var(--brand-text); padding: 0 20px 24px; letter-spacing: -0.02em; }
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 20px; font-size: 14px; font-weight: 500;
  color: var(--text-secondary); transition: all 0.15s;
  border-left: 3px solid transparent;
}
.nav-item:hover { color: var(--text-primary); background: var(--bg-subtle); }
.nav-item.active { color: var(--brand-text); background: var(--brand-light); border-left-color: var(--brand); font-weight: 600; }
.content { margin-left: 240px; flex: 1; padding: 32px 40px 64px; max-width: 1200px; }

/* Page header */
.page-header { margin-bottom: 24px; }
.page-header h1 { font-size: 24px; font-weight: 700; color: var(--text-primary); letter-spacing: -0.02em; }
.page-header .subtitle { color: var(--text-secondary); font-size: 14px; margin-top: 4px; }

/* Filters */
.filters { display: flex; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; align-items: center; }
.filters select, .filters input {
  padding: 8px 12px; border-radius: var(--radius-sm);
  border: 1px solid var(--border); background: var(--bg-card);
  color: var(--text-primary); font-family: inherit; font-size: 14px;
  height: 36px;
}
.filters select:focus, .filters input:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,123,108,0.1); }

/* Main grid */
.main-grid { display: grid; grid-template-columns: 300px 1fr; gap: 24px; }

/* Card */
.card {
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  padding: 24px;
  box-shadow: var(--shadow-sm);
}
.card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
.card h3 { font-size: 14px; font-weight: 600; margin-bottom: 10px; color: var(--brand-text); }

/* Student list */
.student-list { max-height: 70vh; overflow-y: auto; padding-right: 4px; }
.student-card {
  padding: 14px;
  border-radius: var(--radius-md);
  background: var(--bg-card);
  border: 1px solid var(--border-subtle);
  margin-bottom: 8px;
  cursor: pointer;
  transition: all 0.15s;
}
.student-card:hover, .student-card.active { border-color: var(--brand); background: var(--brand-light); }
.student-card .name { font-weight: 600; font-size: 14px; color: var(--text-primary); }
.student-card .meta { font-size: 13px; color: var(--text-tertiary); margin-top: 2px; }
.student-card .badges { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; }
.badge { font-size: 12px; padding: 2px 10px; border-radius: 20px; font-weight: 500; }
.badge-risk { background: var(--danger-bg); color: var(--danger); }
.badge-ok { background: var(--success-bg); color: var(--success); }
.badge-sessions { background: var(--brand-light); color: var(--brand-text); }

/* Right panel */
.panel-empty {
  display: flex; align-items: center; justify-content: center;
  min-height: 300px; color: var(--text-tertiary); font-size: 14px;
  flex-direction: column; gap: 8px;
}
.panel-empty .icon { font-size: 36px; }
.session-list .s-row {
  display: flex; justify-content: space-between; align-items: center;
  padding: 12px 14px; border-radius: var(--radius-md);
  background: var(--bg-subtle); border: 1px solid var(--border-subtle);
  margin-bottom: 8px; cursor: pointer; transition: all 0.15s;
}
.s-row:hover { border-color: var(--brand); }
.s-row .s-date { font-size: 14px; font-weight: 500; color: var(--text-primary); }
.s-row .s-meta { font-size: 13px; color: var(--text-tertiary); }
.chip { display: inline-flex; align-items: center; gap: 4px; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 500; }
.chip-success { background: var(--success-bg); color: var(--success); }
.chip-warning { background: var(--warning-bg); color: var(--warning); }
.chip-danger { background: var(--danger-bg); color: var(--danger); }

/* Notes */
.notes-area {
  width: 100%; min-height: 80px; padding: 10px;
  border-radius: var(--radius-md); border: 1px solid var(--border);
  background: var(--bg-subtle); color: var(--text-primary);
  font-family: inherit; font-size: 14px; resize: vertical;
}
.notes-area:focus { outline: none; border-color: var(--brand); box-shadow: 0 0 0 3px rgba(15,123,108,0.1); }
.btn {
  display: inline-flex; align-items: center; gap: 6px;
  height: 36px; padding: 0 14px; border-radius: var(--radius-sm);
  font-size: 14px; font-weight: 500; border: 1px solid var(--border);
  background: var(--bg-card); color: var(--text-primary);
  cursor: pointer; transition: all 0.15s; font-family: inherit;
}
.btn:hover { background: var(--bg-hover); border-color: var(--border-hover); }
.btn-primary { background: var(--brand); color: #fff; border-color: var(--brand); }
.btn-primary:hover { background: var(--brand-hover); }

.chart-wrap { position: relative; height: 200px; margin-top: 12px; }

@media(max-width: 900px) {
  .sidebar { display: none; }
  .content { margin-left: 0; padding: 20px; }
  .main-grid { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
<div class="layout">
  <nav class="sidebar">
    <div class="sidebar-brand">🌿 CounselAI</div>
    <a href="/dashboard" class="nav-item">📊 Overview</a>
    <a href="/api/v1/dashboard/counsellor" class="nav-item active">👤 Students</a>
    <a href="/dashboard" class="nav-item">🏫 Schools</a>
    <a href="/" class="nav-item">🎤 New Session</a>
  </nav>

  <main class="content">
    <div class="page-header">
      <h1>Counsellor workbench</h1>
      <div class="subtitle">Student management and session history</div>
    </div>

    <div class="filters">
      <select id="filter-school"><option value="">All schools</option>
        {% for s in schools %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
      <select id="filter-grade"><option value="">All classes</option>
        {% for g in grades %}<option value="{{ g }}">Class {{ g }}</option>{% endfor %}
      </select>
      <input type="search" id="filter-search" placeholder="Search students…">
    </div>

    <div class="main-grid">
      <div class="card">
        <h2>Students</h2>
        <div class="student-list" id="student-list">
          <div class="panel-empty"><div class="icon">👤</div>Loading…</div>
        </div>
      </div>
      <div>
        <div class="card" id="right-panel">
          <div class="panel-empty"><div class="icon">📋</div>Select a student to view details</div>
        </div>
      </div>
    </div>
  </main>
</div>

<script>
const listEl=document.getElementById('student-list'),panelEl=document.getElementById('right-panel');
const filterSchool=document.getElementById('filter-school'),filterGrade=document.getElementById('filter-grade'),filterSearch=document.getElementById('filter-search');
let allStudents=[],currentStudent=null;

function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(v){if(!v)return'—';const d=new Date(v);return isNaN(d)?v:d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}

async function loadStudents(){
  try{
    const res=await fetch('/api/v1/counsellor/students');const data=await res.json();
    allStudents=Array.isArray(data.students)?data.students:Array.isArray(data)?data:[];
    renderList();
  }catch(e){listEl.innerHTML='<div class="panel-empty"><div class="icon">⚠️</div>Failed to load students.</div>'}}

function renderList(){
  const school=filterSchool.value,grade=filterGrade.value,q=filterSearch.value.toLowerCase();
  let filtered=allStudents;
  if(school)filtered=filtered.filter(s=>s.school_id==school);
  if(grade)filtered=filtered.filter(s=>String(s.grade)==grade);
  if(q)filtered=filtered.filter(s=>(s.name||'').toLowerCase().includes(q));
  if(!filtered.length){listEl.innerHTML='<div class="panel-empty"><div class="icon">👤</div>No students found.</div>';return}
  listEl.innerHTML=filtered.map(s=>{
    const hasRisk=s.risk_level==='high';
    return`<div class="student-card${currentStudent===s.id?' active':''}" data-id="${s.id}">
      <div class="name">${esc(s.name)}</div>
      <div class="meta">Class ${esc(s.grade||'—')}${s.section?' · '+esc(s.section):''}${s.school_name?' · '+esc(s.school_name):''}</div>
      <div class="badges">${hasRisk?'<span class="badge badge-risk">⚠ At risk</span>':'<span class="badge badge-ok">✓ OK</span>'}
        <span class="badge badge-sessions">${s.session_count||0} sessions</span></div></div>`}).join('');
  listEl.querySelectorAll('.student-card').forEach(c=>c.addEventListener('click',()=>selectStudent(c.dataset.id)))}

async function selectStudent(id){
  currentStudent=id;renderList();
  panelEl.innerHTML='<div class="panel-empty"><div class="icon">⏳</div>Loading…</div>';
  try{
    const res=await fetch(`/api/v1/counsellor/students/${id}`);const data=await res.json();
    const s=data.student||data;const sessions=data.sessions||[];
    panelEl.innerHTML=`
      <h2>${esc(s.name||'Student')}</h2>
      <div style="color:var(--text-secondary);font-size:14px;margin-bottom:20px">Class ${esc(s.grade||'—')}${s.section?' · Section '+esc(s.section):''}${s.school_name?' · '+esc(s.school_name):''}</div>
      <h3>Session history (${sessions.length})</h3>
      <div class="session-list">${sessions.length?sessions.map(ss=>`
        <a href="/api/v1/dashboard/counsellor/session/${ss.id}" style="text-decoration:none;color:inherit">
        <div class="s-row"><div><div class="s-date">${fmtDate(ss.created_at||ss.started_at)}</div>
        <div class="s-meta">${esc(ss.case_study_id||'General')} · ${ss.duration_seconds?Math.round(ss.duration_seconds/60)+'m':'—'}</div></div>
        <span class="chip ${ss.risk_level==='high'?'chip-danger':ss.risk_level==='medium'?'chip-warning':'chip-success'}">${esc(ss.dominant_emotion||'—')}</span></div></a>`).join(''):'<div class="panel-empty"><div class="icon">📋</div>No sessions yet.</div>'}</div>
      <div style="margin-top:24px"><h3>Quick notes</h3>
        <textarea class="notes-area" id="notes-${id}" placeholder="Add observations, follow-up notes…">${esc(s.notes||'')}</textarea>
        <button class="btn" style="margin-top:8px" onclick="saveNotes('${id}')">Save notes</button></div>
      <div style="margin-top:24px"><h3>Session trend</h3><div class="chart-wrap"><canvas id="chart-${id}"></canvas></div></div>`;
    if(sessions.length>1){
      const ctx=document.getElementById(`chart-${id}`).getContext('2d');
      new Chart(ctx,{type:'line',data:{labels:sessions.slice(-10).map(s=>fmtDate(s.created_at)),datasets:[{label:'Confidence',data:sessions.slice(-10).map(s=>s.confidence_score||0),borderColor:'#0F7B6C',backgroundColor:'rgba(15,123,108,0.1)',tension:.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#656D76',font:{family:'DM Sans'}}}},scales:{x:{ticks:{color:'#8B949E'},grid:{color:'rgba(0,0,0,.04)'}},y:{ticks:{color:'#8B949E'},grid:{color:'rgba(0,0,0,.04)'}}}}});}
  }catch(e){panelEl.innerHTML='<div class="panel-empty"><div class="icon">⚠️</div>Failed to load student details.</div>'}}

async function saveNotes(id){
  const text=document.getElementById(`notes-${id}`).value;
  try{await fetch(`/api/v1/counsellor/students/${id}/notes`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:text})})}catch(e){}}

filterSchool.addEventListener('change',renderList);
filterGrade.addEventListener('change',renderList);
filterSearch.addEventListener('input',renderList);
loadStudents();
</script>
</body>
</html>
