<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Counsellor Workbench — CounselAI</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
<style>
:root{--bg:#fafaf7;--surface:#ffffff;--surface-2:#f5f5f0;--border:#e5e5e0;--teal:#2d9d8f;--teal-light:#e6f5f3;--teal-dark:#237e73;--rose:#e05555;--amber:#d4930d;--green:#2d8f5e;--text:#1a1a2e;--muted:#6b7280;--shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;color:var(--text);background:var(--bg);min-height:100vh}
.app{max-width:1400px;margin:0 auto;padding:24px 20px 48px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:24px;flex-wrap:wrap}
.topbar h1{font-size:1.5rem;font-weight:700;color:var(--teal)}
.topbar .sub{color:var(--muted);font-size:.85rem;margin-top:2px}
.nav{display:flex;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:6px;padding:8px 16px;border-radius:10px;font-size:.85rem;font-weight:500;text-decoration:none;color:var(--text);background:var(--surface);border:1px solid var(--border);cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.btn:hover{border-color:var(--teal);color:var(--teal)}

/* Filters */
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:8px 12px;border-radius:10px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:inherit;font-size:.85rem}
.filters select:focus,.filters input:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(45,157,143,.12)}

/* Layout */
.main-grid{display:grid;grid-template-columns:320px 1fr;gap:20px}
@media(max-width:900px){.main-grid{grid-template-columns:1fr}}

/* Student list */
.student-list{max-height:70vh;overflow-y:auto;padding-right:6px}
.student-card{padding:14px;border-radius:12px;background:var(--surface);border:1px solid var(--border);margin-bottom:10px;cursor:pointer;transition:all .2s;box-shadow:var(--shadow)}
.student-card:hover,.student-card.active{border-color:var(--teal);background:var(--teal-light)}
.student-card .name{font-weight:600;font-size:.95rem;margin-bottom:2px;color:var(--text)}
.student-card .meta{font-size:.78rem;color:var(--muted)}
.student-card .badges{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
.badge{font-size:.7rem;padding:2px 8px;border-radius:12px;font-weight:500}
.badge-risk{background:#fde8e8;color:var(--rose);border:1px solid #f5c6c6}
.badge-ok{background:#e6f5ec;color:var(--green);border:1px solid #b8e4c8}
.badge-sessions{background:var(--teal-light);color:var(--teal-dark);border:1px solid #b8e4dc}

/* Right panel */
.panel-empty{display:flex;align-items:center;justify-content:center;min-height:300px;color:var(--muted);font-size:.95rem}
.session-list .s-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:10px;background:var(--surface-2);border:1px solid var(--border);margin-bottom:8px;cursor:pointer;transition:all .2s}
.s-row:hover{border-color:var(--teal)}
.s-row .s-date{font-size:.85rem;font-weight:500;color:var(--text)}
.s-row .s-meta{font-size:.78rem;color:var(--muted)}
.chip{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.72rem;font-weight:500}
.chip-ok{background:#e6f5ec;color:var(--green);border:1px solid #b8e4c8}
.chip-warn{background:#fef3cd;color:var(--amber);border:1px solid #f5e0a0}
.chip-danger{background:#fde8e8;color:var(--rose);border:1px solid #f5c6c6}

/* Notes */
.notes-area{width:100%;min-height:80px;padding:10px;border-radius:10px;border:1px solid var(--border);background:var(--surface-2);color:var(--text);font-family:inherit;font-size:.85rem;resize:vertical}
.notes-area:focus{outline:none;border-color:var(--teal);box-shadow:0 0 0 3px rgba(45,157,143,.12)}

/* Chart */
.chart-wrap{position:relative;height:200px;margin-top:12px}
h2{font-size:1.1rem;margin-bottom:14px;color:var(--text)}
h3{font-size:.95rem;margin-bottom:10px;color:var(--teal)}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div><h1>📋 Counsellor Workbench</h1><div class="sub">Student management &amp; session history</div></div>
    <div class="nav">
      <a class="btn" href="/">Live Session</a>
      <a class="btn" href="/api/v1/dashboard">Admin Dashboard</a>
    </div>
  </div>

  <div class="filters">
    <select id="filter-school"><option value="">All Schools</option>
      {% for s in schools %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
    </select>
    <select id="filter-grade"><option value="">All Classes</option>
      {% for g in grades %}<option value="{{ g }}">Class {{ g }}</option>{% endfor %}
    </select>
    <input type="search" id="filter-search" placeholder="Search students…">
  </div>

  <div class="main-grid">
    <div class="card">
      <h2>Students</h2>
      <div class="student-list" id="student-list">
        <div class="panel-empty">Loading…</div>
      </div>
    </div>
    <div>
      <div class="card" id="right-panel">
        <div class="panel-empty">Select a student to view details</div>
      </div>
    </div>
  </div>
</div>

<script>
const listEl=document.getElementById('student-list'),panelEl=document.getElementById('right-panel');
const filterSchool=document.getElementById('filter-school'),filterGrade=document.getElementById('filter-grade'),filterSearch=document.getElementById('filter-search');
let allStudents=[],currentStudent=null;

function esc(t){return String(t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function fmtDate(v){if(!v)return'—';const d=new Date(v);return isNaN(d)?v:d.toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}

async function loadStudents(){
  try{
    const res=await fetch('/api/v1/counsellor/students');const data=await res.json();
    allStudents=Array.isArray(data.students)?data.students:Array.isArray(data)?data:[];
    renderList();
  }catch(e){listEl.innerHTML='<div class="panel-empty">Failed to load students.</div>'}}

function renderList(){
  const school=filterSchool.value,grade=filterGrade.value,q=filterSearch.value.toLowerCase();
  let filtered=allStudents;
  if(school)filtered=filtered.filter(s=>s.school_id==school);
  if(grade)filtered=filtered.filter(s=>String(s.grade)==grade);
  if(q)filtered=filtered.filter(s=>(s.name||'').toLowerCase().includes(q));
  if(!filtered.length){listEl.innerHTML='<div class="panel-empty">No students found.</div>';return}
  listEl.innerHTML=filtered.map(s=>{
    const hasRisk=s.risk_level==='high';
    return`<div class="student-card${currentStudent===s.id?' active':''}" data-id="${s.id}">
      <div class="name">${esc(s.name)}</div>
      <div class="meta">Class ${esc(s.grade||'—')}${s.section?' · '+esc(s.section):''}${s.school_name?' · '+esc(s.school_name):''}</div>
      <div class="badges">${hasRisk?'<span class="badge badge-risk">⚠ At Risk</span>':'<span class="badge badge-ok">✓ OK</span>'}
        <span class="badge badge-sessions">${s.session_count||0} sessions</span></div></div>`}).join('');
  listEl.querySelectorAll('.student-card').forEach(c=>c.addEventListener('click',()=>selectStudent(c.dataset.id)))}

async function selectStudent(id){
  currentStudent=id;renderList();
  panelEl.innerHTML='<div class="panel-empty">Loading…</div>';
  try{
    const res=await fetch(`/api/v1/counsellor/students/${id}`);const data=await res.json();
    const s=data.student||data;const sessions=data.sessions||[];
    panelEl.innerHTML=`
      <h2>${esc(s.name||'Student')}</h2>
      <div style="color:var(--muted);font-size:.85rem;margin-bottom:16px">Class ${esc(s.grade||'—')}${s.section?' · Section '+esc(s.section):''}${s.school_name?' · '+esc(s.school_name):''}</div>
      <h3>Session History (${sessions.length})</h3>
      <div class="session-list">${sessions.length?sessions.map(ss=>`
        <a href="/api/v1/dashboard/counsellor/session/${ss.id}" style="text-decoration:none;color:inherit">
        <div class="s-row"><div><div class="s-date">${fmtDate(ss.created_at||ss.started_at)}</div>
        <div class="s-meta">${esc(ss.case_study_id||'General')} · ${ss.duration_seconds?Math.round(ss.duration_seconds/60)+'m':'—'}</div></div>
        <span class="chip ${ss.risk_level==='high'?'chip-danger':ss.risk_level==='medium'?'chip-warn':'chip-ok'}">${esc(ss.dominant_emotion||'—')}</span></div></a>`).join(''):'<div class="panel-empty">No sessions yet.</div>'}</div>
      <div style="margin-top:20px"><h3>Quick Notes</h3>
        <textarea class="notes-area" id="notes-${id}" placeholder="Add observations, follow-up notes…">${esc(s.notes||'')}</textarea>
        <button class="btn" style="margin-top:8px" onclick="saveNotes('${id}')">Save Notes</button></div>
      <div style="margin-top:20px"><h3>Session Trend</h3><div class="chart-wrap"><canvas id="chart-${id}"></canvas></div></div>`;
    if(sessions.length>1){
      const ctx=document.getElementById(`chart-${id}`).getContext('2d');
      new Chart(ctx,{type:'line',data:{labels:sessions.slice(-10).map(s=>fmtDate(s.created_at)),datasets:[{label:'Confidence',data:sessions.slice(-10).map(s=>s.confidence_score||0),borderColor:'#2d9d8f',backgroundColor:'rgba(45,157,143,.1)',tension:.4,fill:true}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#6b7280'}}},scales:{x:{ticks:{color:'#6b7280'},grid:{color:'rgba(0,0,0,.06)'}},y:{ticks:{color:'#6b7280'},grid:{color:'rgba(0,0,0,.06)'}}}}});}
  }catch(e){panelEl.innerHTML='<div class="panel-empty">Failed to load student details.</div>'}}

async function saveNotes(id){
  const text=document.getElementById(`notes-${id}`).value;
  try{await fetch(`/api/v1/counsellor/students/${id}/notes`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({notes:text})})}catch(e){}}

filterSchool.addEventListener('change',renderList);
filterGrade.addEventListener('change',renderList);
filterSearch.addEventListener('input',renderList);
loadStudents();
</script>
</body>
</html>
